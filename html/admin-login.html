<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Admin Login - NeuroSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        :root {
            --accent-signal: #F97316;
            --obsidian: #0D0D0E;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--obsidian);
            color: #FAFAFA;
            overflow: hidden;
        }
        .login-card {
            background: linear-gradient(135deg, rgba(22, 22, 24, 0.9) 0%, rgba(13, 13, 14, 0.95) 100%);
            border: 1px solid #27272A;
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-signal), transparent);
        }
        .input-neural {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #27272A;
            color: #FAFAFA;
            transition: all 0.3s ease;
        }
        .input-neural:focus {
            border-color: var(--accent-signal);
            background: rgba(249, 115, 22, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.1);
        }
        .btn-neural {
            background: var(--accent-signal);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-neural:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.4);
        }
        #error-msg {
            color: #EF4444;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 1rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="login-card p-10 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center size-16 border border-accent-signal mb-4">
                <span class="material-symbols-outlined text-3xl text-orange-500">lock_open</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter uppercase">Root_Access</h1>
            <p class="text-xs text-zinc-500 mt-1 tracking-widest uppercase">Admin Verification Protocol Enabled</p>
        </div>

        <form id="admin-login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2">Identifier</label>
                <input type="text" id="username" required class="input-neural w-full p-4 text-sm" placeholder="ADMIN_ID" />
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2">Cipher_Key</label>
                <input type="password" id="password" required class="input-neural w-full p-4 text-sm" placeholder="••••••••" />
            </div>
            <button type="submit" class="btn-neural w-full py-4 text-xs mt-4">Execute_Login</button>
            <div id="error-msg">Access Denied: Invalid Credentials</div>
        </form>
    </div>

    <script>
        const form = document.getElementById('admin-login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // Hardcoded Credentials
            if (u === 'Admin' && p === 'NeuroNext@4397') {
                // Set session token (client-side only for this hardcoded mock)
                sessionStorage.setItem('root_admin_session', 'ACTIVE_' + Date.now());
                window.location.href = 'admin-dashboard.html';
            } else {
                errorMsg.style.opacity = '1';
                setTimeout(() => { errorMsg.style.opacity = '0'; }, 3000);
            }
        });
    </script>
</body>
</html>
