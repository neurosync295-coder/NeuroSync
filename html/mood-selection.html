<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co;">
    <title>NeuroSync | Neural Telemetry</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <!-- Global Resources -->
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/mood-selection.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Base Components -->
    <script src="/js/theme.js"></script>
    <script src="/js/sidemenu.js"></script>
    <script src="/js/navbar-component.js"></script>
    <script type="module" src="/js/auth-guard.js"></script>
</head>

<body class="bg-obsidian text-primary overflow-hidden">
    <div id="side-menu-container"></div>
    <div id="universal-navbar-container"></div>

    <!-- Main Neural Dashboard -->
    <main class="ml-64 h-screen pt-16 flex overflow-hidden">
        
        <!-- Left Wing: Telemetry History -->
        <aside class="w-80 border-r border-raw bg-secondary flex flex-col telemetry-sidebar">
            <div class="px-6 py-4 border-b border-raw bg-obsidian">
                <div class="telemetry-label mb-1">
                    <span class="material-symbols-outlined text-sm">history</span>
                    SYNC_HISTORY
                </div>
                <h2 class="text-sm font-bold tracking-widest uppercase">Neural_Logs</h2>
            </div>

            <!-- Streak Counter -->
            <div class="m-4 p-4 bg-obsidian border border-raw relative overflow-hidden group">
                <div class="telemetry-label mb-2">SEQUENCE_STABILITY</div>
                <div id="streak-display" class="text-2xl font-bold text-secondary tracking-tighter">0 CYCLES</div>
                <div class="absolute -right-2 -bottom-2 opacity-10 group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-6xl">bolt</span>
                </div>
            </div>

            <!-- Search Field -->
            <div class="px-4 mb-4">
                <div class="relative flex items-center bg-obsidian border border-raw p-2 group focus-within:border-active transition-colors">
                    <span class="material-symbols-outlined text-sm opacity-40 mr-2 group-focus-within:text-signal">search</span>
                    <input id="history-search" type="text" placeholder="QUERY_BUFFER..." class="bg-transparent border-none outline-none text-xs w-full placeholder:opacity-30" />
                </div>
            </div>

            <!-- Scrollable Log -->
            <div id="history-list" class="flex-1 overflow-y-auto custom-scroll px-4 pb-4 flex flex-col gap-2">
                <div class="neural-loader-small py-10 opacity-30 text-center">
                    <div class="telemetry-label justify-center">BUFFER_SCANNING...</div>
                </div>
            </div>
        </aside>

        <!-- Center: Neural Link Workspace -->
        <section class="flex-1 flex flex-col bg-obsidian relative">
            
            <!-- HUD Header -->
            <div class="px-8 py-4 border-b border-raw flex items-center justify-between backdrop-blur-md bg-obsidian/80">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 border border-active flex items-center justify-center relative">
                        <span class="material-symbols-outlined text-signal animate-pulse">psychology</span>
                        <div class="absolute -top-1 -right-1 w-2 h-2 bg-signal"></div>
                    </div>
                    <div>
                        <div class="telemetry-label">NEURAL_ASSISTANT_V1</div>
                        <div class="text-xs font-bold flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-signal rounded-full animate-ping"></span>
                            ACTIVE_UPLINK
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="reset-uplink" class="obsidian-button px-4 py-2 text-[10px] tracking-[0.2em]">
                        REBOOT_LINK
                    </button>
                </div>
            </div>

            <!-- Transmission Log (Chat) -->
            <div id="chat-window" class="flex-1 overflow-y-auto custom-scroll p-8 flex flex-col gap-6">
                <!-- Messages stream here -->
            </div>

            <!-- Dynamic Input Protocol -->
            <div id="input-protocol" class="p-8 border-t border-raw bg-secondary/30 backdrop-blur-lg">
                
                <!-- Quick Response Array -->
                <div id="quick-replies" class="flex flex-wrap gap-2 mb-6 hidden"></div>

                <!-- Neural Sensor Array (Mood Buttons) -->
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <div class="telemetry-label">STATE_SCAN_ARRAY</div>
                        <div class="flex gap-4">
                            <button class="cat-filter active" data-cat="all">ALL</button>
                            <button class="cat-filter" data-cat="positive">POS</button>
                            <button class="cat-filter" data-cat="negative">NEG</button>
                        </div>
                    </div>
                    <div id="mood-grid" class="grid grid-cols-5 g-4 gap-3 max-h-48 overflow-y-auto custom-scroll pr-2">
                        <!-- Positive -->
                        <button class="mood-btn" data-mood="Happy" data-cat="positive"><span>😄</span>HAPPY</button>
                        <button class="mood-btn" data-mood="Excited" data-cat="positive"><span>🤩</span>EXCITED</button>
                        <button class="mood-btn" data-mood="Ambitious" data-cat="positive"><span>💪</span>AMBITIOUS</button>
                        <button class="mood-btn" data-mood="Confident" data-cat="positive"><span>😎</span>CONFIDENT</button>
                        <button class="mood-btn" data-mood="Determined" data-cat="positive"><span>🔥</span>DETERMINED</button>
                        
                        <!-- Negative -->
                        <button class="mood-btn" data-mood="Sad" data-cat="negative"><span>😔</span>SAD</button>
                        <button class="mood-btn" data-mood="Angry" data-cat="negative"><span>😠</span>ANGRY</button>
                        <button class="mood-btn" data-mood="Anxious" data-cat="negative"><span>😟</span>ANXIOUS</button>
                        <button class="mood-btn" data-mood="Stressed" data-cat="negative"><span>😰</span>STRESSED</button>
                        <button class="mood-btn" data-mood="Tired" data-cat="negative"><span>😴</span>TIRED</button>
                    </div>
                </div>

                <!-- Raw Transmission Buffer -->
                <form id="chat-form" class="flex gap-4">
                    <div class="flex-1 relative">
                        <input id="chat-input" type="text" autocomplete="off" placeholder="KEY_IN_DATA_TRANSMISSION..." 
                               class="w-full bg-obsidian border border-raw px-6 py-4 text-sm font-medium focus:border-active outline-none transition-all placeholder:opacity-20" />
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-1 opacity-20 hover:opacity-100 transition-opacity">
                            <span class="material-symbols-outlined text-xs">keyboard_command_key</span>
                            <span class="text-[10px]">ENTER</span>
                        </div>
                    </div>
                    <button type="submit" class="obsidian-button-primary px-8 flex items-center justify-center">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Neural Controller -->
    <script type="module">
        import * as MoodModule from '/js/mood.js';
        
        // Initialize Core Logic
        document.addEventListener('DOMContentLoaded', () => {
            MoodModule.initMoodModule();
            
            const chatWindow = document.getElementById('chat-window');
            const chatForm = document.getElementById('chat-form');
            const chatInput = document.getElementById('chat-input');
            const moodButtons = document.querySelectorAll('.mood-btn');
            const resetBtn = document.getElementById('reset-uplink');
            const catFilters = document.querySelectorAll('.cat-filter');

            // Handle Chat Transmission
            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                await MoodModule.handleUserMessage(chatInput.value, chatWindow, chatInput);
            });

            // Handle Quick Replies (Custom Event from Module)
            window.addEventListener('ns-quick-reply', async (e) => {
                await MoodModule.handleUserMessage(e.detail, chatWindow, chatInput);
            });

            // Handle Mood Selection
            moodButtons.forEach(btn => {
                btn.addEventListener('click', async () => {
                    moodButtons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    
                    const mood = btn.dataset.mood;
                    MoodModule.conversationState.currentMood = mood;
                    MoodModule.conversationState.convStep = 0;
                    
                    await MoodModule.saveMoodEntry(mood);
                    await MoodModule.handleUserMessage(`LOG_STATE: ${mood.toUpperCase()}`, chatWindow, chatInput);
                });
            });

            // Category Filtering
            catFilters.forEach(f => {
                f.addEventListener('click', () => {
                    catFilters.forEach(x => x.classList.remove('active'));
                    f.classList.add('active');
                    const cat = f.dataset.cat;
                    moodButtons.forEach(b => {
                        b.style.display = (cat === 'all' || b.dataset.cat === cat) ? 'flex' : 'none';
                    });
                });
            });

            // Reset UI
            resetBtn.addEventListener('click', () => {
                MoodModule.resetConversationUI();
                initializeGreeting();
            });

            // Initial Burst
            function initializeGreeting() {
                setTimeout(() => {
                    const greeting = "UPLINK_STABLE. Neural Assistant ready for synchronization.\n\n**STATUS_QUERY:** How is your current neural state? Toggle the Sensor Array or provide manual input.";
                    MoodModule.handleUserMessage('', chatWindow, null); // Just for spacing if needed
                    // Injecting initial message manually since handleUserMessage expects user input
                    const wrap = document.createElement('div');
                    wrap.className = 'msg-wrap msg-anim role-bot';
                    wrap.innerHTML = `<div class="bot-avatar-mini"><span class="material-symbols-outlined">smart_toy</span></div><div class="msg-bubble bot-bubble">${greeting.replace(/\n/g, '<br/>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</div>`;
                    chatWindow.appendChild(wrap);
                }, 500);
            }
            initializeGreeting();
        });
    </script>
</body>
</html>
 });

      // ---- Init ----
      resetChat();
    </script>
    </div>
  </main>
</body>

</html>
