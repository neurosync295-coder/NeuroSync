<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co https://res.cloudinary.com https://*.googleusercontent.com; connect-src 'self' https://*.supabase.co https://www.soundjay.com; media-src 'self' https://www.soundjay.com;">
    <link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect" />
    <link as="style"
        href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Space+Grotesk%3Awght%40400%3B500%3B700&amp;family=Story+Script%3Awght%40400"
        onload="this.rel='stylesheet'" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Feedback Admin - NeuroSync</title>
    <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/sidemenu.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/navbar-component.js"></script>
    <!-- Supabase Integration -->
    <script type="module">
        import { supabase } from '../js/supabase.js';

        let currentFilter = 'all';
        let currentStatus = 'all';

        supabase.auth.onAuthStateChange((event, session) => {
            if (!session && event !== 'INITIAL_SESSION') {
                window.location.href = 'auth.html';
            } else if (session) {
                loadFeedbackData();
            }
        });

        // Initial check
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'auth.html'; return; }
            loadFeedbackData();
        })();

        async function loadFeedbackData() {
            try {
                showLoadingSpinner('#feedback-container');

                let query = supabase
                    .from('feedback')
                    .select('*');

                if (currentStatus !== 'all') {
                    query = query.eq('status', currentStatus);
                }

                const { data, error } = await query.order('created_at', { ascending: false });

                if (error) throw error;

                displayFeedbacks(data || []);
            } catch (error) {
                console.error('Error loading feedback:', error);
                showNotification('Error loading feedback data', 'error');
            }
        }

        function displayFeedbacks(feedbacks) {
            const container = document.getElementById('feedback-container');
            container.innerHTML = '';

            if (feedbacks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <span class="material-symbols-outlined text-6xl text-secondary mb-4">feedback</span>
                        <h3 class="text-xl font-bold text-primary mb-2">No Feedback Found</h3>
                        <p class="text-secondary">No feedback submissions match the current filter.</p>
                    </div>
                `;
                return;
            }

            feedbacks.forEach(feedback => {
                const feedbackCard = createFeedbackCard(feedback);
                container.appendChild(feedbackCard);
            });
        }

        function createFeedbackCard(feedback) {
            const card = document.createElement('div');
            card.className = 'bg-secondary/50 backdrop-blur-sm border border-primary rounded-xl p-6 mb-4';

            const date = new Date(feedback.created_at).toLocaleDateString();
            const stars = '★'.repeat(feedback.rating || 0) + '☆'.repeat(5 - (feedback.rating || 0));

            card.innerHTML = `
                <div class="flex items-start justify-between mb-4">
                    <div class="flex-1">
                        <h3 class="text-xl font-bold text-primary mb-2">${feedback.feedback_type || feedback.category || 'General'}</h3>
                        <div class="flex items-center gap-4 text-sm text-secondary mb-2">
                            <span>${feedback.user_name || 'Anonymous'}</span>
                            <span>•</span>
                            <span>${feedback.user_email || 'No email'}</span>
                            <span>•</span>
                            <span>${feedback.user_class || 'No class'}</span>
                            <span>•</span>
                            <span>${feedback.user_role || 'Student'}</span>
                        </div>
                        <p class="text-sm text-secondary">${date}</p>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div class="text-yellow-400 text-lg">${stars}</div>
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${feedback.status === 'pending' ? 'bg-yellow-500/20 text-yellow-400' :
                    feedback.status === 'reviewed' ? 'bg-blue-500/20 text-blue-400' :
                        feedback.status === 'resolved' ? 'bg-green-500/20 text-green-400' :
                            'bg-gray-500/20 text-gray-400'
                }">
                            ${feedback.status || 'pending'}
                        </span>
                    </div>
                </div>
                
                <div class="bg-tertiary/50 rounded-lg p-4 mb-4">
                    <p class="text-white/80">${feedback.message}</p>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="updateStatus('${feedback.id}', 'reviewed')" 
                            class="px-3 py-1 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm transition-colors">
                        Mark Reviewed
                    </button>
                    <button onclick="updateStatus('${feedback.id}', 'resolved')" 
                            class="px-3 py-1 bg-green-500 hover:bg-green-600 text-white rounded-lg text-sm transition-colors">
                        Mark Resolved
                    </button>
                    <button onclick="deleteRecord('${feedback.id}')" 
                            class="px-3 py-1 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm transition-colors">
                        Delete
                    </button>
                </div>
            `;

            return card;
        }

        window.updateStatus = async (feedbackId, status) => {
            try {
                const { error } = await supabase
                    .from('feedback')
                    .update({ status: status })
                    .eq('id', feedbackId);

                if (error) throw error;

                showNotification(`Feedback marked as ${status}`, 'success');
                loadFeedbackData();
            } catch (error) {
                console.error('Error updating feedback status:', error);
                showNotification('Error updating feedback status', 'error');
            }
        };

        window.deleteRecord = async (feedbackId) => {
            if (!confirm('Are you sure you want to delete this feedback?')) return;

            try {
                const { error } = await supabase
                    .from('feedback')
                    .delete()
                    .eq('id', feedbackId);

                if (error) throw error;

                showNotification('Feedback deleted successfully', 'success');
                loadFeedbackData();
            } catch (error) {
                console.error('Error deleting feedback:', error);
                showNotification('Error deleting feedback', 'error');
            }
        };

        window.filterByStatus = (status) => {
            currentStatus = status;
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('bg-accent', 'text-primary');
                btn.classList.add('text-muted');
            });
            document.getElementById(`status-${status}`).classList.add('bg-accent', 'text-primary');
            document.getElementById(`status-${status}`).classList.remove('text-muted');
            loadFeedbackData();
        };

        function showLoadingSpinner(selector) {
            const container = document.querySelector(selector);
            if (!container) return;
            container.innerHTML = `
                <div class="flex items-center justify-center py-12">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent"></div>
                    <span class="ml-3 text-secondary">Loading...</span>
                </div>
            `;
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 text-white ${type === 'success' ? 'bg-green-500' :
                type === 'error' ? 'bg-red-500' : 'bg-blue-500'
                }`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        window.signOut = async () => {
            const { error } = await supabase.auth.signOut();
            if (error) console.error('Sign out error:', error);
            window.location.href = '../index.html';
        };
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/mobile-optimizations.css" />

</head>

<body class="bg-primary dark">
    <div id="side-menu-container"></div>
    <div id="universal-navbar-container"></div>
    <div class="relative flex size-full min-h-screen flex-col group/design-root overflow-x-hidden"
        style='font-family: "Space Grotesk", "Noto Sans", sans-serif;'>
        <div class="absolute inset-0 -z-10 overflow-hidden">
            <!-- Particle background -->
            <div class="particle"
                style="--x-start: 10vw; --y-start: 20vh; --x-end: 90vw; --y-end: 80vh; width: 2px; height: 2px; animation-delay: 0s;">
            </div>
            <div class="particle"
                style="--x-start: 80vw; --y-start: 10vh; --x-end: 20vw; --y-end: 90vh; width: 1px; height: 1px; animation-delay: -1s;">
            </div>
            <!-- ... more particles ... -->
        </div>

        <main class="flex-1 p-6 transition-all duration-300">
            <div class="max-w-7xl mx-auto">
                <!-- Header Section -->
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold tracking-tight mb-2">Feedback Admin Panel</h1>
                    <p class="text-secondary">Manage and review user feedback submissions</p>
                </div>

                <!-- Filter Section -->
                <div class="bg-secondary/50 backdrop-blur-sm border border-primary rounded-xl p-6 mb-8">
                    <div class="flex flex-wrap gap-2">
                        <button id="status-all" onclick="filterByStatus('all')"
                            class="status-btn bg-accent text-primary px-4 py-2 rounded-full text-sm font-medium transition-colors">All</button>
                        <button id="status-pending" onclick="filterByStatus('pending')"
                            class="status-btn text-muted px-4 py-2 rounded-full text-sm font-medium transition-colors">Pending</button>
                        <button id="status-reviewed" onclick="filterByStatus('reviewed')"
                            class="status-btn text-muted px-4 py-2 rounded-full text-sm font-medium transition-colors">Reviewed</button>
                        <button id="status-resolved" onclick="filterByStatus('resolved')"
                            class="status-btn text-muted px-4 py-2 rounded-full text-sm font-medium transition-colors">Resolved</button>
                    </div>
                </div>

                <!-- Feedback List -->
                <div id="feedback-container">
                    <!-- Feedback items will be loaded here -->
                </div>
            </div>
    </div>
    </main>
    </div>
</body>

</html>
